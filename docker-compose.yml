# =============================================================================
# Lumio — Docker Compose Stack
# =============================================================================
# Für Entwicklung: docker compose up -d
# Für Produktion: zusätzlich docker-compose.prod.yml mergen (siehe Docs).

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy — TLS, HTTP/3, Routing
  # ---------------------------------------------------------------------------
  caddy:
    build:
      context: .
      dockerfile: infra/caddy/Dockerfile
    container_name: lumio_caddy
    restart: unless-stopped
    environment:
      # LUMIO_HOST: bewusst KEIN Default. Wenn nicht gesetzt, fällt
      # das Caddyfile auf einen unerreichbaren Loopback-Host zurück
      # (127.0.0.1:9), der spezifische Hauptdomain-Block ist dann tot,
      # und der http:// Catch-All-Block bedient alles auf Port 80. Das
      # ist genau das gewünschte Verhalten für lokales Dev und für
      # Custom-Domain-fähige Produktion ohne Hauptdomain. Falls eine
      # Hauptdomain gewünscht ist, in .env: LUMIO_HOST=lumio-cloud.de
      # WICHTIG: Default ist eine tote Loopback-Adresse, NICHT leer —
      # Caddys {$VAR:default} greift nur bei UNGESETZTER Variable; eine
      # leere ergäbe einen Site-Block ohne Key und Caddy startet nicht.
      - LUMIO_HOST=${LUMIO_HOST:-127.0.0.1:9}
      - LUMIO_S3_HOST=${LUMIO_S3_HOST:-:81}
      # Optional: Wildcard-Hostname für Tenant-Subdomains. Default ist
      # ein internes Pseudo-Host (127.0.0.1:9), das niemals von außen
      # erreichbar ist — der Caddy-Block matched dann nichts, und der
      # Hauptdomain-Block bleibt der einzige aktive.
      # Aktivieren in .env mit z.B. LUMIO_WILDCARD_HOST=*.lumio-cloud.de:80
      # Tote Default-Adressen müssen sich pro Block in der IP unterscheiden
      # (nicht nur im Port): Caddys TLS-Automation-Policies sind Host-basiert,
      # gleiche IP in zwei Blöcken = "ambiguous automation policy"-Crash.
      - LUMIO_WILDCARD_HOST=${LUMIO_WILDCARD_HOST:-127.0.0.2:9}
      # Optional: Host für die Umami-Analytics (infra/umami). Default
      # 127.0.0.1:9 = inaktiv (kein Cert-Versuch). Aktivieren in .env mit
      # z.B. LUMIO_UMAMI_HOST=stats.lumio-cloud.de (A-Record + laufender
      # Umami-Stack vorausgesetzt).
      - LUMIO_UMAMI_HOST=${LUMIO_UMAMI_HOST:-127.0.0.3:9}
      # Marketing-Sites (opt-in, siehe Caddyfile): default-tot mit je
      # eigener Loopback-IP. Wer die Sites neben Lumio fährt, setzt die
      # echten Domains in der .env.
      - LUMIO_MARKETING_CLOUD_DE_HOST=${LUMIO_MARKETING_CLOUD_DE_HOST:-127.0.0.4:9}
      - LUMIO_MARKETING_APP_DE_HOST=${LUMIO_MARKETING_APP_DE_HOST:-127.0.0.5:9}
      - LUMIO_MARKETING_CLOUD_COM_HOST=${LUMIO_MARKETING_CLOUD_COM_HOST:-127.0.0.6:9}
      - LUMIO_MARKETING_CLOUD_COM_WWW_HOST=${LUMIO_MARKETING_CLOUD_COM_WWW_HOST:-127.0.0.7:9}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/secrets:/etc/caddy/secrets:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js Studio & Galerien
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* müssen zur Build-Zeit gesetzt sein (Next.js backt sie
      # ins Bundle). Das environment unten ist für etwaige Server-Side-Reads
      # zusätzlich gesetzt, ersetzt aber NICHT diese Build-Args.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-single}
        NEXT_PUBLIC_DOMAIN_BASE: ${LUMIO_DOMAIN_BASE:-}
    container_name: lumio_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Leer = same-origin: API-Calls gehen an denselben Host wie das Frontend,
      # also durch Caddy. Bei Split-Deployment kann NEXT_PUBLIC_API_URL gesetzt
      # werden (z.B. https://api.example.com).
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-single}
      # Im Multi-Mode: Basis-Domain des Cloud-Setups (z.B. lumio-cloud.de).
      # Wird vom Frontend genutzt um Apex- von Tenant-Subdomain zu
      # unterscheiden und beim Tenant-Picker die Subdomain-URL zu bauen.
      # Im Single-Mode irrelevant, kann leer bleiben.
      - NEXT_PUBLIC_DOMAIN_BASE=${LUMIO_DOMAIN_BASE:-}
    # Direkter Frontend-Port ist nur für Debug nützlich — externe Anfragen
    # gehen durch Caddy. Default-Bind ist 127.0.0.1, damit der Container nicht
    # versehentlich ohne Caddy aus dem Internet erreichbar ist. Für direkte
    # Erreichbarkeit FRONTEND_PORT in der .env setzen und (optional) das
    # Binding auf 0.0.0.0 ändern.
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # API — Fastify REST + WebSocket
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lumio_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-single}
      # Muss dem MinIO-Port-Mapping unten entsprechen: ohne S3_PUBLIC_URL
      # signiert die API presigned URLs auf http://<request-host>:<PORT>.
      - MINIO_API_PORT=${MINIO_API_PORT:-9000}
      # Feature-Flags global aktivieren (Self-Hosting ohne Super-Admin),
      # z.B. FEATURES_ENABLED=print_shop,advanced_analytics
      - FEATURES_ENABLED=${FEATURES_ENABLED:-}
      # Print-Provider global aktivieren (Self-Hosting), z.B.
      # PRINT_PROVIDERS_ENABLED=prodigi,gelato — Self-Print ist immer an.
      - PRINT_PROVIDERS_ENABLED=${PRINT_PROVIDERS_ENABLED:-}
      - PUBLIC_URL=${PUBLIC_URL}
      # Basis-Domain für die Subdomain-Tenant-Auflösung (Multi-Mode).
      # Ohne diese Variable erkennt resolveTenant <slug>.<base> nicht und
      # jede Tenant-Subdomain fällt auf tenant:null zurück.
      - LUMIO_DOMAIN_BASE=${LUMIO_DOMAIN_BASE:-}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-minio}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - MAX_FILE_SIZE_MIB=${MAX_FILE_SIZE_MIB:-2048}
      - BILLING_ENABLED=${BILLING_ENABLED:-false}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LUMIO_LEGAL_IMPRINT_URL=${LUMIO_LEGAL_IMPRINT_URL:-}
      - LUMIO_LEGAL_PRIVACY_URL=${LUMIO_LEGAL_PRIVACY_URL:-}
      # Update-Check (Super-Admin → System). Quelle default = Forgejo (im
      # Code); Token nötig wenn das Repo privat ist.
      - LUMIO_UPDATE_REPO_URL=${LUMIO_UPDATE_REPO_URL:-}
      - LUMIO_UPDATE_REPO_TOKEN=${LUMIO_UPDATE_REPO_TOKEN:-}
      - DISABLE_UPDATE_CHECK=${DISABLE_UPDATE_CHECK:-}
    # Auch hier: direkter Port ist Debug-Hilfe, regulärer Zugriff geht durch
    # Caddy → /api/*.
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # Worker — Python/Celery für RAW/Video/Thumbnails/ZIP
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-minio}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Billing-Lifecycle (Trial-Expiry, Read-only-Eskalation, Suspend).
      # consumer.py triggert enforce_limits nur wenn das hier "true" ist —
      # ohne diese Zeile lief der gesamte Read-only-Lifecycle nie.
      - BILLING_ENABLED=${BILLING_ENABLED:-false}
    deploy:
      replicas: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    # GPU-Beschleunigung optional (Intel QSV / AMD VAAPI):
    # devices:
    #   - /dev/dri:/dev/dri
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # Postgres — Metadaten
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lumio_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Standard: nur im Docker-Netz erreichbar (kein Host-Port).
    # Für Multi-Node-Setups: POSTGRES_BIND_IP auf die PRIVATE Netz-IP
    # setzen (z.B. 10.0.0.2), damit Worker-Nodes drankommen. NIE auf
    # 0.0.0.0 — das wäre öffentlich erreichbar. Wenn die Variable leer
    # ist, wird kein Port gemappt.
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:5432:5432"
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # Redis — Queue + Cache + Pub/Sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lumio_redis
    restart: unless-stopped
    # requirepass wird nur gesetzt wenn REDIS_PASSWORD in der .env steht.
    # Single-Node-Self-Hoster brauchen es nicht (Redis bleibt im Docker-
    # Netz). Multi-Node-Setups MÜSSEN es setzen, da Redis dann übers private
    # Netz erreichbar ist. Die sh-Expansion fügt das Flag konditional hinzu
    # ($$ = an die Shell durchgereichtes $, nicht von Compose expandiert).
    command: >
      sh -c 'exec redis-server --save 60 1 --loglevel warning
      --maxmemory-policy allkeys-lru
      $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # Standard 127.0.0.1 = nur lokal. Multi-Node: REDIS_BIND_IP auf die
    # PRIVATE Netz-IP setzen (z.B. 10.0.0.2). NIE 0.0.0.0.
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # MinIO — S3-kompatibler Object Storage (für Self-Hosting)
  # ---------------------------------------------------------------------------
  # Im Cloud-Modus (R2/AWS S3/B2/...) kannst du diesen Service auskommentieren
  # und stattdessen die externen S3-Credentials in der .env hinterlegen.
  minio:
    image: minio/minio:latest
    container_name: lumio_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      # CORS für Browser-Upload — siehe docs/DEVELOPMENT.md
      # In Produktion auf konkrete Origins einschränken.
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Web-Konsole
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # MinIO-Bucket-Init — legt beim ersten Start den Bucket an
  # ---------------------------------------------------------------------------
  minio_init:
    image: minio/mc:latest
    container_name: lumio_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      (mc mb local/$$S3_BUCKET --ignore-existing) &&
      mc anonymous set none local/$$S3_BUCKET &&
      mc ilm rule add --id 'abort-incomplete-multipart' --prefix '' --abort-incomplete-mpu-days 7 local/$$S3_BUCKET 2>/dev/null || mc ilm rule list local/$$S3_BUCKET | grep -q abort-incomplete-multipart || echo 'WARN: could not add abort-multipart lifecycle rule (mc version too old? add manually via console)' &&
      echo 'MinIO bucket initialized: '$$S3_BUCKET
      "
    restart: "no"
    networks:
      - lumio_net

  # ---------------------------------------------------------------------------
  # acme-dns — DNS-Server NUR für ACME-Challenges
  # ---------------------------------------------------------------------------
  # Eigener winziger DNS-Server, der ausschließlich _acme-challenge-TXT-
  # Records bedient. Nötig für Wildcard-Zertifikate (LE verlangt DNS-01,
  # nicht HTTP-01) wenn der DNS-Provider keinen API-Zugang bietet.
  #
  # Setup:
  #   1. Beim DNS-Provider zwei Records setzen:
  #        auth.<DOMAIN>   A    <SERVER-IP>
  #        auth.<DOMAIN>   NS   auth.<DOMAIN>
  #   2. Account anlegen via:
  #        curl -X POST https://auth.<DOMAIN>/register
  #   3. Beim DNS-Provider CNAME setzen:
  #        _acme-challenge.<DOMAIN>   CNAME   <subdomain-aus-register>.auth.<DOMAIN>
  #   4. Credentials aus register-Response in caddy.acme-dns.json schreiben.
  #
  # Port 53 muss von außen erreichbar sein (DNS-Queries von Let's Encrypt).
  # Cloud-Firewall: TCP+UDP 53 inbound erlauben.
  acme_dns:
    image: joohoi/acme-dns:latest
    container_name: lumio_acme_dns
    restart: unless-stopped
    # Nur für Wildcard-TLS (Multi-Tenant-Subdomains) nötig. Single-Mode-
    # Self-Hoster brauchen diesen Container NICHT — er startet daher nur
    # mit:  docker compose --profile wildcard up
    profiles: ["wildcard"]
    ports:
      # Bewusst NICHT 0.0.0.0:53 — das kollidiert auf Ubuntu mit
      # systemd-resolved, das auf 127.0.0.53:53 lauscht. Linux verbietet
      # 0.0.0.0:X-Binds wenn schon 127.x:X gebunden ist (selbst loopback-
      # only Listener machen 0.0.0.0 zum Konflikt). Lösung: an die
      # öffentliche IP binden. ACME_DNS_BIND_IP muss in der .env
      # auf die externe Server-IP gesetzt sein.
      # Default 127.0.0.1 nur, damit Compose ohne gesetzte Variable keine
      # verwirrende Warnung ausgibt — der Service startet ohne
      # --profile wildcard ohnehin nicht. Für aktives Wildcard-TLS MUSS
      # die externe Server-IP gesetzt werden (siehe Kommentar oben).
      - "${ACME_DNS_BIND_IP:-127.0.0.1}:53:53/udp"
      - "${ACME_DNS_BIND_IP:-127.0.0.1}:53:53/tcp"
      - "127.0.0.1:8053:80"  # API nur intern + via Caddy reverse-proxied
    volumes:
      # Live-Konfig liegt in config.local.cfg (gitignored, von git pull
      # unberührt). Vorlage: infra/acme-dns/config.cfg.
      - ./infra/acme-dns/config.local.cfg:/etc/acme-dns/config.cfg:ro
      - acme_dns_data:/var/lib/acme-dns
    networks:
      - lumio_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  acme_dns_data:

networks:
  lumio_net:
    driver: bridge
