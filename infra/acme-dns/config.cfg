# ==========================================================================
# VORLAGE — nicht direkt benutzen.
#
# Diese Datei ist eine Platzhalter-Vorlage. Die LIVE-Konfiguration liegt in
#   infra/acme-dns/config.local.cfg
# (gitignored, von git pull unberührt). Erstmalig anlegen mit:
#   cp infra/acme-dns/config.cfg infra/acme-dns/config.local.cfg
# und dort die echten Werte (Domain, IP) eintragen.
#
# acme-dns wird nur für Wildcard-TLS im Multi-Tenant-/SaaS-Modus gebraucht.
# Ein einfacher Single-Mode-Self-Host braucht diesen Container nicht.
# ==========================================================================

[general]
# Welcher Hostname die DNS-Authority ist. MUSS bei deinem DNS-Provider als
# A + NS-Record auf diesen Server zeigen.
#   auth.example.com   A    203.0.113.10
#   auth.example.com   NS   auth.example.com
listen = "0.0.0.0:53"
protocol = "both"
domain = "auth.example.com"
nsname = "auth.example.com"
nsadmin = "admin.example.com"

# Records die per DNS abgefragt werden können (NS, A für die acme-dns-
# Subdomain selbst). Werden hier statisch geliefert, damit acme-dns auch
# auf Selbst-Lookup richtig antwortet.
records = [
    "auth.example.com. A 203.0.113.10",
    "auth.example.com. NS auth.example.com.",
]

debug = false

[database]
# Postgres statt sqlite3 — joohoi/acme-dns:latest hat keinen kompilierten
# sqlite3-Treiber mehr. Wir nutzen das vorhandene Lumio-Postgres mit einer
# eigenen DB 'acme_dns' (siehe postgres-init.sql).
# Hinweis: 'acme_dns_local_pw' ist ein NUR im Docker-Netz erreichbares
# internes Passwort und muss mit postgres-init.sql übereinstimmen. Für
# gehärtete Setups beide Stellen gemeinsam ändern.
engine = "postgres"
connection = "postgres://acme_dns:acme_dns_local_pw@postgres:5432/acme_dns?sslmode=disable"

[api]
ip = "0.0.0.0"
port = "80"
disable_registration = false
# TLS wird vom davorgeschalteten Caddy gemacht — acme-dns selbst nur HTTP
tls = "none"
# CORS nicht nötig, API wird nur von Caddy intern angesprochen
corsorigins = ["*"]
use_header = false
header_name = "X-Forwarded-For"

[logconfig]
loglevel = "info"
logtype = "stdout"
logformat = "text"
